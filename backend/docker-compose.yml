version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: decorarte-rh360-app
    container_name: decorarte-rh360-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - decorarte-network

  web:
    image: nginx:alpine
    container_name: decorarte-rh360-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - decorarte-network

  db:
    image: postgres:15-alpine
    container_name: decorarte-rh360-db
    restart: unless-stopped
    ports:
      - "54320:5432"
    environment:
      POSTGRES_DB: decorarte_rh
      POSTGRES_USER: decorarte_admin
      POSTGRES_PASSWORD: decorarte_secure_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - decorarte-network

networks:
  decorarte-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
